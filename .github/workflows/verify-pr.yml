name: Agent-Verifikation

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "content/**"
      - "pending/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Änderungen ermitteln
        id: diff
        run: |
          git diff origin/main...HEAD --name-only > changed_files.txt
          cat changed_files.txt

      - name: Verifikations-Webhook an Hermes Agent
        run: |
          curl -X POST "${{ secrets.HERMES_WEBHOOK_URL }}/verify-pr" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.HERMES_API_KEY }}" \
            -d '{
              "pr_number": ${{ github.event.pull_request.number }},
              "pr_url": "${{ github.event.pull_request.html_url }}",
              "repo": "${{ github.repository }}",
              "sha": "${{ github.event.pull_request.head.sha }}"
            }'
